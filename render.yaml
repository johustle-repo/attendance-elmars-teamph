databases:
  - name: duscaff-attendance-db
    plan: free

services:
  - type: web
    name: duscaff-attendance
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://attendance-elmars-teamph.onrender.com
      - key: ASSET_URL
        value: https://attendance-elmars-teamph.onrender.com
      - key: APP_TIMEZONE
        value: Asia/Manila
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: duscaff-attendance-db
          property: connectionString
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: database
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: FIREBASE_DATABASE_URL
        sync: false
      - key: FIREBASE_DATABASE_SECRET
        sync: false
