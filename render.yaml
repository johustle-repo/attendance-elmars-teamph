services:
  - type: web
    name: duscaff-attendance
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        sync: false
      - key: APP_TIMEZONE
        value: Asia/Manila
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/data/database.sqlite
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: FIREBASE_DATABASE_URL
        sync: false
      - key: FIREBASE_DATABASE_SECRET
        sync: false
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
